# ─────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — DevSecOps for Azure Data Platform
# ─────────────────────────────────────────────────────────────────────────────
# Interview talking points:
#   - "This pipeline implements Shift-Left security: Checkov scans IaC for
#     misconfigurations BEFORE any resources are created."
#   - "We use OIDC federation (not service principal secrets) to authenticate
#     GitHub Actions to Azure — the `azure/login` action exchanges a GitHub
#     JWT for an Azure token."
#   - "This demonstrates Push-Based GitOps: Instead of ArgoCD inside the
#     cluster pulling from Git, our GitHub Actions pipeline pushes (kubectl apply)
#     to the cluster upon merge. This is an excellent Stage 1 maturity model."
# ─────────────────────────────────────────────────────────────────────────────

name: "CI/CD — Terraform & Push GitOps"

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - "k8s/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
      - "k8s/**"

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write    # Required for OIDC federation
  contents: read
  pull-requests: write  # Post plan output as PR comment

env:
  TOFU_VERSION: "1.6.2"
  TERRAGRUNT_VERSION: "0.55.0"

jobs:
  # ── Job 1: Security Scan (runs on ALL triggers) ────────────────────────────
  security-scan:
    name: "🛡️ Checkov Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/
          framework: terraform
          soft_fail: false    # Fail the pipeline on security violations
          output_format: sarif
          download_external_modules: true

  # ── Job 2: Validate & Plan (runs on PR and push) ──────────────────────────
  terraform-plan:
    name: "📋 Terraform Plan (${{ matrix.environment }})"
    runs-on: ubuntu-latest
    needs: security-scan
    strategy:
      matrix:
        environment: [dev]   # Add 'prod' when ready
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Setup Terragrunt
        run: |
          curl -sL "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64" \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terragrunt Validate
        working-directory: infra/live/${{ matrix.environment }}
        run: terragrunt run-all validate --terragrunt-non-interactive

      - name: Terragrunt Plan
        working-directory: infra/live/${{ matrix.environment }}
        run: |
          terragrunt run-all plan \
            --terragrunt-non-interactive \
            -out=tfplan 2>&1 | tee plan_output.txt

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('infra/live/${{ matrix.environment }}/plan_output.txt', 'utf8');
            const truncated = output.length > 60000 ? output.substring(0, 60000) + '\n... (truncated)' : output;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Terraform Plan — \`${{ matrix.environment }}\`\n\`\`\`\n${truncated}\n\`\`\``
            });

  # ── Job 3: Apply (only on merge to main) ──────────────────────────────────
  terraform-apply:
    name: "🚀 Terraform Apply (${{ matrix.environment }})"
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: ${{ matrix.environment }}   # Requires GitHub Environment approval
    strategy:
      matrix:
        environment: [dev]   # Add 'prod' with manual approval gate
      fail-fast: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Setup Terragrunt
        run: |
          curl -sL "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64" \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terragrunt Apply
        working-directory: infra/live/${{ matrix.environment }}
        run: |
          terragrunt run-all apply \
            --terragrunt-non-interactive \
            -auto-approve

  # ── Job 4: K8s Manifest Validation (runs on ALL triggers) ────────────────
  k8s-validate:
    name: "☸️ Kubernetes Manifest Validation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeval
        run: |
          curl -sL https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin

      - name: Validate K8s base manifests
        run: kubeval --strict k8s/base/*.yaml

  # ── Job 5: Kubernetes Deploy (Push GitOps) ────────────────────────────────
  kubernetes-deploy:
    name: "🚢 Kubernetes Apply (Push GitOps)"
    runs-on: ubuntu-latest
    needs: [terraform-apply, k8s-validate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Get AKS Credentials
        # NOTE: Using dev environment hardcoded here for the demo. In a real
        # pipeline, this would use a matrix strategy or environment variables.
        run: |
          az aks get-credentials --resource-group te-data-dev-rg --name te-dev-aks --overwrite-existing

      - name: Apply Base Manifests
        # Pushes base NS/RBAC/Policies to the cluster
        run: |
          kubectl apply -f k8s/base/

      # NOTE: For Airflow and Kafka (which use Helm charts currently defined as ArgoCD Application CRDs),
      # in a pure Push-based GitOps flow you would run `helm upgrade --install` here instead of applying ArgoCD files.
      # For example: 
      # helm repo add apache-airflow https://airflow.apache.org
      # helm upgrade --install airflow apache-airflow/airflow -n airflow
