# ─────────────────────────────────────────────────────────────────────────────
# Resource Quotas — prevent runaway resource consumption
# ─────────────────────────────────────────────────────────────────────────────
# Interview talking point: "Resource quotas are the safety net for multi-tenant
# clusters. Without them, one team's memory leak can OOM-kill pods in other
# namespaces. Quotas enforce hard limits per namespace."
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ResourceQuota
metadata:
  name: data-platform-quota
  namespace: data-platform
spec:
  hard:
    requests.cpu: "8"
    requests.memory: "16Gi"
    limits.cpu: "16"
    limits.memory: "32Gi"
    pods: "50"
    services: "10"
    persistentvolumeclaims: "20"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: airflow-quota
  namespace: airflow
spec:
  hard:
    requests.cpu: "16"
    requests.memory: "32Gi"
    limits.cpu: "32"
    limits.memory: "64Gi"
    pods: "100"            # KubernetesExecutor creates many short-lived pods
    services: "10"
    persistentvolumeclaims: "10"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: kafka-quota
  namespace: kafka
spec:
  hard:
    requests.cpu: "12"
    requests.memory: "24Gi"
    limits.cpu: "24"
    limits.memory: "48Gi"
    pods: "30"
    services: "10"
    persistentvolumeclaims: "15"
